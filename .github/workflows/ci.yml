name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
    steps:
    - uses: actions/checkout@v6
    - name: Install Senzing SDK
      run: |
        curl -fsSL https://senzing-production-apt.s3.amazonaws.com/senzingrepo_2.0.1-1_all.deb -o /tmp/senzingrepo.deb
        sudo dpkg -i /tmp/senzingrepo.deb
        sudo apt-get update
        sudo apt-get install -y senzingsdk-runtime
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - run: cargo fmt -- --check
    - run: cargo clippy --all-targets -- -D warnings
    - run: cargo build
    - run: cargo test --lib
