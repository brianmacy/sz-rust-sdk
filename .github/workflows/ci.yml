name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - run: cargo fmt -- --check
    - name: Run clippy
      env:
        RUSTFLAGS: -C link-args=-Wl,--allow-shlib-undefined
      run: cargo clippy --all-targets -- -D warnings

  # Linux SDK tests disabled — apt repo does not yet have v4.3 (internal:// support)
  # Re-enable when senzingsdk-runtime >= 4.3 is published to the apt repo
  # test-linux:
  #   runs-on: ubuntu-latest
  #   needs: lint
  #   steps:
  #   - uses: actions/checkout@v6.0.2
  #   - uses: dtolnay/rust-toolchain@stable
  #   - name: Install Senzing SDK
  #     run: |
  #       sudo apt-get install -y apt-transport-https
  #       wget -q https://senzing-production-apt.s3.amazonaws.com/senzingrepo_2.0.2-1_all.deb -O /tmp/senzingrepo.deb
  #       sudo apt-get install -y /tmp/senzingrepo.deb
  #       sudo apt-get update
  #       sudo SENZING_ACCEPT_EULA=I_ACCEPT_THE_SENZING_EULA DEBIAN_FRONTEND=noninteractive apt-get install -y senzingsdk-runtime
  #   - name: Run tests
  #     env:
  #       LD_LIBRARY_PATH: /opt/senzing/er/lib
  #     run: cargo test

  test-macos:
    runs-on: macos-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: dtolnay/rust-toolchain@stable
    - name: Install Senzing SDK
      env:
        HOMEBREW_SENZING_ACCEPT_EULA: i_accept_the_senzing_eula
      run: |
        brew tap senzing/senzingsdk https://github.com/Senzing/homebrew-senzingsdk
        brew install --cask senzingsdk
    - name: Run tests
      env:
        DYLD_LIBRARY_PATH: "${{ env.HOMEBREW_PREFIX || '/opt/homebrew' }}/opt/senzing/er/lib:${{ env.HOMEBREW_PREFIX || '/opt/homebrew' }}/opt/openssl@3/lib:${{ env.HOMEBREW_PREFIX || '/opt/homebrew' }}/opt/sqlite/lib"
      run: cargo test

  test-windows:
    runs-on: windows-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: dtolnay/rust-toolchain@stable
    - name: Install Scoop and Senzing SDK
      shell: pwsh
      env:
        SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
      run: |
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
        Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
        # Scoop installer adds shims to PATH for the current process
        $env:PATH = "$HOME\scoop\shims;$env:PATH"
        scoop bucket add senzingsdk https://github.com/Senzing/scoop-senzingsdk
        scoop install senzingsdk/senzingsdk
        # Persist SENZING_DIR for subsequent steps
        $senzingDir = (scoop prefix senzingsdk) + "\er"
        echo "SENZING_DIR=$senzingDir" >> $env:GITHUB_ENV
        echo "$senzingDir\lib" >> $env:GITHUB_PATH
    - name: Run tests
      shell: pwsh
      run: cargo test
