name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - run: cargo fmt -- --check
    - name: Run clippy
      env:
        RUSTFLAGS: -C link-args=-Wl,--allow-shlib-undefined
      run: cargo clippy --all-targets -- -D warnings

  test-linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - name: Install Senzing SDK
      env:
        SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
      run: |
        curl -fsSL https://senzing-production-apt.s3.amazonaws.com/senzingrepo_2.0.0-1_all.deb -o /tmp/senzingrepo.deb
        sudo dpkg -i /tmp/senzingrepo.deb
        sudo apt-get update
        sudo apt-get install -y senzingsdk-runtime senzingsdk-setup
    - name: Run tests
      env:
        LD_LIBRARY_PATH: /opt/senzing/er/lib
      run: cargo test

  test-macos:
    runs-on: macos-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - name: Install Senzing SDK
      env:
        HOMEBREW_SENZING_ACCEPT_EULA: i_accept_the_senzing_eula
      run: |
        brew tap senzing/senzingsdk https://github.com/Senzing/homebrew-senzingsdk
        brew install --cask senzingsdk
    - name: Run tests
      env:
        DYLD_LIBRARY_PATH: "${{ env.HOMEBREW_PREFIX || '/opt/homebrew' }}/opt/senzing/er/lib:${{ env.HOMEBREW_PREFIX || '/opt/homebrew' }}/opt/openssl@3/lib:${{ env.HOMEBREW_PREFIX || '/opt/homebrew' }}/opt/sqlite/lib"
      run: cargo test

  test-windows:
    runs-on: windows-latest
    needs: lint
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - name: Install Scoop
      shell: pwsh
      run: |
        if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
        }
    - name: Install Senzing SDK
      shell: pwsh
      env:
        SENZING_ACCEPT_EULA: I_ACCEPT_THE_SENZING_EULA
      run: |
        scoop bucket add senzingsdk https://github.com/Senzing/scoop-senzingsdk
        scoop install senzingsdk/senzingsdk
    - name: Run tests
      shell: pwsh
      run: cargo test
